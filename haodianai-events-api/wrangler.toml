name = "haodianai-events-api"
main = "src/index.ts"
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 19 * * *", "0 18 * * *"]
# 0 19 UTC = 北京 03:00 爬虫
# 0 18 UTC = 北京 02:00 清理过期活动

[[routes]]
pattern = "api.haodianai.com/*"
zone_name = "haodianai.com"

[[d1_databases]]
binding = "DB"
database_name = "haodianai-events"
database_id = "1c55f927-5ff7-4476-8cd7-5972f853d4a7"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = false

[vars]
DEEPSEEK_BASE_URL = "https://api.siliconflow.cn/v1"
DEEPSEEK_MODEL = "deepseek-chat"
AMAP_KEY = "26b06bcb2f6ef8e3e17089acec05964e"
# Secrets (wrangler secret put):
# DEEPSEEK_API_KEY
# ADMIN_API_KEY
